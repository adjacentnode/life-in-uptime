name: Verify

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm run build
      - name: Check internal links and social previews
        run: |
          npm run start -- --hostname 127.0.0.1 --port 3101 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3101 >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:3101 >/dev/null
          npm run check:links
          npm run check:og
